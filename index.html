<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Bot · Interfaz Genérica</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #e2e8f0;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 1rem;
    }

    /* contenedor principal — super sencillo, sin adornos innecesarios */
    .bot-interface {
      max-width: 700px;
      width: 100%;
      height: 85vh;
      background: white;
      border-radius: 28px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.02);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* cabecera minimal */
    .chat-header {
      background: #f8fafc;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid #e2edf2;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .header-title {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .bot-name {
      font-weight: 600;
      font-size: 1.2rem;
      letter-spacing: -0.2px;
      color: #1e293b;
    }

    .badge {
      background: #e0f2fe;
      color: #0369a1;
      font-size: 0.7rem;
      font-weight: 500;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
    }

    .clear-btn {
      background: none;
      border: none;
      font-size: 0.8rem;
      color: #5b6e8c;
      cursor: pointer;
      padding: 0.3rem 0.8rem;
      border-radius: 40px;
      transition: 0.1s;
      font-weight: 450;
    }

    .clear-btn:hover {
      background: #eef2ff;
      color: #1e293b;
    }

    /* área de mensajes — flexible y genérica */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      background: #ffffff;
      scroll-behavior: smooth;
    }

    /* mensajes individuales: estilo burbuja genérica */
    .message {
      max-width: 85%;
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.2s ease;
      line-height: 1.4;
    }

    /* mensaje del usuario: alineado a la derecha */
    .message.user {
      align-self: flex-end;
    }

    /* mensaje del bot: alineado a la izquierda */
    .message.bot {
      align-self: flex-start;
    }

    /* burbujas */
    .bubble {
      padding: 0.7rem 1rem;
      border-radius: 22px;
      font-size: 0.95rem;
      word-break: break-word;
      white-space: pre-wrap;
      box-shadow: 0 1px 1px rgba(0, 0, 0, 0.02);
    }

    .user .bubble {
      background: #d9f0ec;
      color: #0f172a;
      border-bottom-right-radius: 4px;
      border-top-right-radius: 20px;
    }

    .bot .bubble {
      background: #f1f5f9;
      color: #0f172a;
      border-bottom-left-radius: 4px;
      border-top-left-radius: 20px;
    }

    /* pequeño remate de nombre dentro del bubble (opcional pero muy claro) */
    .sender-name {
      font-size: 0.7rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
      letter-spacing: 0.3px;
      opacity: 0.7;
      display: inline-block;
    }

    .user .sender-name {
      color: #115e59;
      text-align: right;
      display: block;
    }

    .bot .sender-name {
      color: #334155;
    }

    .message-text {
      margin-top: 0.1rem;
    }

    /* input area sensilla */
    .input-area {
      background: #fefefe;
      border-top: 1px solid #e9eef3;
      padding: 0.9rem 1rem;
      display: flex;
      gap: 0.7rem;
      align-items: center;
    }

    .input-area input {
      flex: 1;
      border: 1px solid #cbd5e1;
      border-radius: 48px;
      padding: 0.7rem 1.2rem;
      font-size: 0.95rem;
      font-family: inherit;
      background: white;
      transition: 0.15s;
      outline: none;
    }

    .input-area input:focus {
      border-color: #94a3b8;
      box-shadow: 0 0 0 2px #e2e8f0;
    }

    .input-area button {
      background: #eef2ff;
      border: none;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.6rem 1.4rem;
      border-radius: 40px;
      color: #1e293b;
      cursor: pointer;
      transition: 0.1s;
      font-family: inherit;
    }

    .input-area button:hover {
      background: #e0e7ff;
      transform: scale(0.97);
    }

    /* scroll invisible pero funcional */
    .chat-messages::-webkit-scrollbar {
      width: 5px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* responsive extremo */
    @media (max-width: 500px) {
      .bot-interface {
        height: 90vh;
        border-radius: 24px;
      }
      .message {
        max-width: 92%;
      }
      .bubble {
        padding: 0.6rem 0.9rem;
        font-size: 0.9rem;
      }
      .input-area button {
        padding: 0.5rem 1rem;
      }
    }
  </style>
</head>
<body>
<div class="bot-interface">
  <!-- cabecera sin distracciones -->
  <div class="chat-header">
    <div class="header-title">
      <span class="bot-name">🤖 Bot Genérico</span>
      <span class="badge">interfaz simple</span>
    </div>
    <button class="clear-btn" id="clearChatBtn" aria-label="Limpiar conversación">⟳ Limpiar</button>
  </div>

  <!-- zona de mensajes -->
  <div class="chat-messages" id="chatMessages">
    <!-- los mensajes se inyectan dinámicamente -->
  </div>

  <!-- caja de entrada universal -->
  <div class="input-area">
    <input type="text" id="messageInput" placeholder="Escribe tu mensaje..." autocomplete="off" aria-label="Mensaje para el bot">
    <button id="sendBtn">Enviar</button>
  </div>
</div>

<script>
  // ---------- INTERFAZ GENÉRICA PARA BOT ----------
  // Solo UI visual y demo de interacción, sin lógica externa ni APIs.
  // La respuesta del bot es un eco genérico que demuestra el flujo visual.
  // Representa cualquier "bot" → se puede reemplazar fácilmente.
  
  // Elementos del DOM
  const messagesContainer = document.getElementById('chatMessages');
  const messageInput = document.getElementById('messageInput');
  const sendButton = document.getElementById('sendBtn');
  const clearButton = document.getElementById('clearChatBtn');

  // Función para agregar un mensaje a la interfaz (público: 'user' o 'bot')
  function addMessage(sender, text) {
    if (!text || text.trim() === '') return;

    const messageDiv = document.createElement('div');
    messageDiv.classList.add('message', sender);

    // estructura interna: nombre visible + burbuja con texto
    const bubbleDiv = document.createElement('div');
    bubbleDiv.classList.add('bubble');

    const nameSpan = document.createElement('span');
    nameSpan.classList.add('sender-name');
    // texto de identificador simple y claro
    if (sender === 'user') {
      nameSpan.textContent = '👤 Tú';
    } else {
      nameSpan.textContent = '⚙️ Bot';
    }

    const textSpan = document.createElement('div');
    textSpan.classList.add('message-text');
    // escape básico para evitar inyección (usando textContent)
    textSpan.textContent = text;

    bubbleDiv.appendChild(nameSpan);
    bubbleDiv.appendChild(textSpan);
    messageDiv.appendChild(bubbleDiv);
    
    messagesContainer.appendChild(messageDiv);
    // auto scroll hacia abajo (siempre visible el mensaje nuevo)
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }

  // mensaje inicial de bienvenida (solo para mostrar interfaz viva)
  function setInitialMessage() {
    // limpieza inicial segura
    messagesContainer.innerHTML = '';
    addMessage('bot', '¡Hola! 👋 Esta es una interfaz super sencilla y genérica para cualquier bot. Puedes escribir y el bot responderá de forma demostrativa. (Solo front-end visual)');
    addMessage('bot', '💬 Escribe algo abajo. La respuesta será un eco genérico — ideal para integrar tu propia lógica después.');
  }

  // respuesta generica del bot: solo para demostrar interfaz,
  // sin llamadas externas. Es un eco simple que muestra que la UI funciona.
  // De esta forma el propósito es únicamente visual/interfaz.
  function genericBotReply(userMessage) {
    // mensaje genérico de ejemplo, manteniendo la naturaleza "demo de interfaz"
    // pero mostrando interacción completa. Puedes reemplazar con cualquier API.
    const demoPrefix = "📟 [respuesta genérica] · ";
    // opción super simple y genérica: eco + frase estándar
    // Mantiene el espíritu de solo interfaz, pero el bot conversa de modo placeholder.
    const replyText = `${demoPrefix}"${userMessage}" — Mensaje recibido. (Bot demo, solo interfaz)`;
    return replyText;
  }

  // función que envía el mensaje escrito por el usuario y luego genera respuesta visual del bot
  function sendUserMessage() {
    const rawMessage = messageInput.value;
    if (!rawMessage || rawMessage.trim() === '') return;

    const cleanMessage = rawMessage.trim();
    // 1. Mostrar mensaje del usuario en la interfaz
    addMessage('user', cleanMessage);
    
    // 2. generar la respuesta genérica del bot (simplemente para que la interfaz se vea dinámica)
    const botAnswer = genericBotReply(cleanMessage);
    
    // pequeño retardo opcional para simular "procesamiento" y dar sensación natural
    // pero sigue siendo UI pura, sin nada real detrás.
    setTimeout(() => {
      addMessage('bot', botAnswer);
      // auto scroll ya está dentro de addMessage, pero reaseguramos
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }, 180);
    
    // limpiar input y mantener foco
    messageInput.value = '';
    messageInput.focus();
  }

  // Limpiar toda la conversación pero manteniendo un par de mensajes iniciales básicos
  // para que la interfaz no se quede vacía y se vea coherente.
  function resetConversation() {
    messagesContainer.innerHTML = '';
    // mensajes frescos y genéricos (sin perder la esencia de interfaz)
    addMessage('bot', '🧹 Conversación reiniciada. Interfaz lista nuevamente.');
    addMessage('bot', '✨ Bot genérico — solo diseño, sin lógica compleja. Puedes escribir otro mensaje.');
    addMessage('bot', '💡 Consejo: esta interfaz es completamente independiente; puedes conectar tu propio bot más tarde.');
    // opcional: pequeño mensaje adicional de contexto
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }

  // Eventos
  sendButton.addEventListener('click', () => {
    sendUserMessage();
  });
  
  messageInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      sendUserMessage();
    }
  });
  
  clearButton.addEventListener('click', () => {
    resetConversation();
  });
  
  // Inicializar la interfaz con mensajes de bienvenida claros (sin recurrir a nada externo)
  setInitialMessage();
  
  // Pequeño detalle extra: foco automático al cargar la página
  window.addEventListener('load', () => {
    messageInput.focus();
  });
</script>
</body>
</html>
