<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AOS-0.1</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      width: 600px;
      max-width: 100%;
      height: 580px;
      background: #1a1a1a;
      border-radius: 16px;
      border: 1px solid #2e2e2e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header { padding: 16px 20px; border-bottom: 1px solid #2e2e2e; font-size: 15px; font-weight: 500; color: #e0e0e0; }
    #messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 16px; scrollbar-width: thin; scrollbar-color: #333 transparent; }
    .msg-wrap { display: flex; flex-direction: column; max-width: 80%; }
    .msg-wrap.user { align-self: flex-end; align-items: flex-end; }
    .msg-wrap.ai   { align-self: flex-start; align-items: flex-start; }
    .bubble { padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-break: break-word; white-space: pre-wrap; }
    .bubble.user { background: #2a3a5e; color: #a8c4ff; border: 1px solid #3a4f7a; }
    .bubble.ai   { background: #252525; color: #d4d4d4; border: 1px solid #2e2e2e; }
    .label { font-size: 11px; color: #555; margin-top: 4px; padding: 0 4px; }
    .input-area { display: flex; gap: 8px; align-items: flex-end; padding: 12px 16px; border-top: 1px solid #2e2e2e; background: #1a1a1a; }
    textarea { flex: 1; resize: none; border: 1px solid #2e2e2e; border-radius: 10px; font-size: 14px; padding: 10px 12px; line-height: 1.5; max-height: 120px; overflow-y: auto; font-family: inherit; outline: none; background: #111; color: #d4d4d4; }
    textarea::placeholder { color: #444; }
    textarea:focus { border-color: #444; }
    button { height: 40px; padding: 0 12px; border-radius: 10px; border: 1px solid #2e2e2e; background: #252525; color: #d4d4d4; font-size: 14px; cursor: pointer; transition: background 0.15s; }
    button:hover  { background: #333; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: default; }
    .dots { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #555; animation: blink 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:.2;transform:scale(.8);} 40%{opacity:1;transform:scale(1);} }

    /* Cámara en vivo */
    #cameraPanel {
      display: none;
      flex-shrink: 0;
      border-top: 1px solid #2e2e2e;
      background: #111;
      padding: 12px;
    }
    .camera-view {
      position: relative;
      width: 100%;
      max-height: 220px;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
    }
    #video, #overlay {
      width: 100%;
      display: block;
    }
    #overlay {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
    }
    .cam-controls {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      gap: 8px;
    }
    #liveInfo {
      color: #aaa;
      font-size: 13px;
      margin-top: 6px;
      min-height: 36px;
      line-height: 1.4;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
</head>
<body>
<div class="container">
  <div class="header">AOS-0.1</div>
  <div id="messages">
    <div class="msg-wrap ai">
      <div class="bubble ai">¡Hola! ¿En qué puedo ayudarte hoy?</div>
      <span class="label">IA</span>
    </div>
  </div>
  <div class="input-area">
    <input type="file" id="imageInput" accept="image/*" style="display:none" />
    <button id="attachBtn" onclick="document.getElementById('imageInput').click()">📎</button>
    <button id="cameraBtn" onclick="toggleCamera()">📷</button>
    <textarea id="input" rows="1" placeholder="Escribe tu mensaje..."></textarea>
    <button id="sendBtn" onclick="sendMessage()">Enviar</button>
  </div>
  <!-- Panel de la cámara (oculto por defecto) -->
  <div id="cameraPanel">
    <div class="camera-view">
      <video id="video" autoplay playsinline></video>
      <canvas id="overlay"></canvas>
    </div>
    <div class="cam-controls">
      <button id="captureBtn" onclick="capturePhoto()">📸 Capturar</button>
      <button id="closeCameraBtn" onclick="toggleCamera()">❌ Cerrar</button>
    </div>
    <div id="liveInfo"></div>
  </div>
</div>

<script>
  // ─────────────────────────────────────────
  // CARGA DE MODELOS (MobileNet + COCO-SSD)
  let mobilenetModel = null;
  let cocoModel = null;
  (async function () {
    mobilenetModel = await mobilenet.load();
    console.log("MobileNet listo");
    cocoModel = await cocoSsd.load();
    console.log("COCO-SSD listo para detección en vivo");
  })();
  // ─────────────────────────────────────────

  // ─────────────────────────────────────────
  // RESPUESTAS PRE-PROGRAMADAS
  const respuestas = [
    {
      claves: ["hola", "buenas", "hey", "saludos", "buenos días", "buenas tardes", "buenas noches"],
      respuestas: [
        "¡Hola! ¿En qué te puedo ayudar?",
        "¡Hey! Aquí estoy, ¿qué necesitás?",
        "¡Buenas! ¿Cómo te puedo ayudar hoy?",
        "¡Hola! Un gusto. ¿En qué andás?"
      ]
    },
    {
      claves: ["cómo estás", "como estas", "qué tal", "todo bien", "cómo andás", "como andas"],
      respuestas: [
        "¡Muy bien, gracias por preguntar! ¿Y vos?",
        "Todo excelente por acá. ¿Cómo estás vos?",
        "De maravilla. ¿En qué te puedo ayudar?",
        "¡Bien! Listo para ayudarte."
      ]
    },
    {
      claves: ["nombre", "cómo te llamas", "como te llamas", "quién eres", "quien eres", "quien sos", "quíen sos", "cual es tu nombre"],
      respuestas: [
        "Soy tu asistente virtual. ¡Podés cambiar mi nombre en el código!",
        "Me llaman IA, aunque podés ponerme el nombre que quieras.",
        "Soy un bot sencillo. Mi nombre lo definís vos."
      ]
    },
    {
      claves: ["gracias", "muchas gracias", "te lo agradezco", "grax"],
      respuestas: [
        "¡De nada! Para eso estoy.",
        "¡Con gusto! ¿Necesitás algo más?",
        "No hay de qué. ¡Siempre a disposición!",
        "¡Fue un placer ayudarte!"
      ]
    },
    {
      claves: ["chau", "adiós", "adios", "hasta luego", "nos vemos", "bye"],
      respuestas: [
        "¡Hasta luego! Fue un placer.",
        "¡Chau! Volvé cuando quieras.",
        "¡Nos vemos! Que te vaya bien.",
        "¡Hasta pronto!",
        "¡nos vemos! cuidate"
      ]
    },
    {
      claves: ["ayuda", "qué podés hacer", "que podes hacer", "qué hacés", "que haces", "para qué servís"],
      respuestas: [
        "Puedo responder preguntas que tengas programadas. ¡Agregá más en el código!",
        "Soy un asistente simple con respuestas pre-cargadas. ¡Personalizame!",
        "Por ahora respondo lo que me enseñaron. Podés ampliarme editando el archivo."
      ]
    }
  ];

  const fallbacks = [
    "No entendí bien eso. ¿Podés reformularlo?",
    "Hmm, no tengo una respuesta para eso todavía.",
    "No estoy seguro de cómo responder eso. ¿Intentás con otra pregunta?",
    "Eso está fuera de lo que sé por ahora."
  ];

  function random(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function obtenerRespuesta(texto) {
    const t = texto.toLowerCase().trim();
    for (const entrada of respuestas) {
      if (entrada.claves.some(c => t.includes(c))) return random(entrada.respuestas);
    }
    return random(fallbacks);
  }

  async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    addMessage(text, 'user');
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;
    const typing = addTyping();
    await new Promise(r => setTimeout(r, 700));
    typing.remove();
    addMessage(obtenerRespuesta(text), 'ai');
    document.getElementById('sendBtn').disabled = false;
  }

  function addMessage(text, role) {
    const wrap = document.createElement('div');
    wrap.className = `msg-wrap ${role}`;
    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.textContent = text;
    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = role === 'user' ? 'Tú' : 'IA';
    wrap.appendChild(bubble);
    wrap.appendChild(label);
    const msgs = document.getElementById('messages');
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addImageMessage(imageUrl, role) {
    const wrap = document.createElement('div');
    wrap.className = `msg-wrap ${role}`;
    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    const img = document.createElement('img');
    img.src = imageUrl;
    img.style.maxWidth = '200px';
    img.style.borderRadius = '10px';
    bubble.appendChild(img);
    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = role === 'user' ? 'Tú' : 'IA';
    wrap.appendChild(bubble);
    wrap.appendChild(label);
    const msgs = document.getElementById('messages');
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap ai';
    wrap.innerHTML = `<div class="bubble ai"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
    document.getElementById('messages').appendChild(wrap);
    document.getElementById('messages').scrollTop = 9999;
    return wrap;
  }

  // ─── EXPLICACIONES VARIADAS ───
  const explicacionesGato = [
    "🐱 **Gato** – Felino doméstico de cuerpo flexible y orejas puntiagudas. Sus bigotes le sirven para medir espacios y sus garras retráctiles lo ayudan a trepar. Tiene una excelente visión nocturna y un oído muy fino.",
    "🐱 **Gato** – Animal de compañía con un esqueleto muy elástico y reflejos rápidos. Posee almohadillas en las patas que le permiten caminar en silencio. Es curioso por naturaleza.",
    "🐱 **Gato** – Mamífero carnívoro domesticado hace más de 4000 años. Sus ojos pueden dilatar mucho la pupila para ver en la oscuridad. Ronronean para comunicar bienestar.",
    "🐱 **Gato** – Pequeño felino con un gran sentido del equilibrio gracias a su cola. Es un cazador nato, aunque viva en casa. Duerme muchas horas y se asea constantemente."
  ];
  const explicacionesPerro = [
    "🐶 **Perro** – Descendiente del lobo, domesticado por el humano. Su olfato es hasta 100.000 veces más potente que el nuestro. Leal y sociable, entiende muchas emociones.",
    "🐶 **Perro** – Mamífero carnívoro con hocico largo y cola expresiva. Existen cientos de razas. Son grandes compañeros de vida.",
    "🐶 **Perro** – Animal de manada que disfruta la compañía y el juego. Su ladrido y orejas comunican su estado de ánimo. Primer animal domesticado.",
    "🐶 **Perro** – Fiel amigo de cuatro patas. Su oído capta sonidos que nosotros no. Respira agitadamente para regular su temperatura."
  ];
  const explicacionesPlanta = [
    "🌿 **Planta** – Organismo vivo que fabrica su alimento con fotosíntesis. Hojas captan luz, raíces absorben agua. Esenciales para el oxígeno.",
    "🌿 **Planta** – Ser del reino vegetal con clorofila verde. Puede ser árbol, arbusto, flor o cactus. Base de la cadena alimenticia.",
    "🌿 **Planta** – Además de oxígeno, evitan la erosión con sus raíces. Sus flores atraen polinizadores y sus frutos dispersan semillas.",
    "🌿 **Planta** – Ser vivo con ciclo de germinación, crecimiento, floración y producción de semillas. Sin ellas, la Tierra sería inhabitable."
  ];
  const explicacionesHumano = [
    "🧑 **Humano** – Ser bípedo con cerebro desarrollado. Capaz de razonar, crear arte y comunicarse con lenguajes complejos. Manos libres para herramientas.",
    "🧑 **Humano** – *Homo sapiens*: pensamiento abstracto, planificación y cooperación en grandes grupos. Ha modificado el planeta como ningún otro ser.",
    "🧑 **Humano** – Cuerpo con dos piernas, dos brazos y cráneo grande. Piel variable según melanina. Transmite conocimiento por lenguaje.",
    "🧑 **Humano** – Ser social con empatía y conciencia de sí mismo. Infancia prolongada para aprender. Imagina escenarios futuros."
  ];

  function obtenerExplicacion(className) {
    const c = className.toLowerCase();
    if (c.includes('cat')) return random(explicacionesGato);
    if (c.includes('dog')) return random(explicacionesPerro);
    if (c.includes('plant') || c.includes('potted')) return random(explicacionesPlanta);
    if (c.includes('person')) return random(explicacionesHumano);
    return null;
  }

  // ─── RECONOCIMIENTO POR ARCHIVO (MobileNet) ───
  const imageInput = document.getElementById('imageInput');
  imageInput.addEventListener('change', async function () {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async function (e) {
      const imageUrl = e.target.result;
      addImageMessage(imageUrl, 'user');
      if (!mobilenetModel) {
        addMessage('El modelo aún está cargando...', 'ai');
        return;
      }
      const imgElement = document.createElement('img');
      imgElement.src = imageUrl;
      imgElement.onload = async function () {
        try {
          const predictions = await mobilenetModel.classify(imgElement);
          if (predictions.length === 0) {
            addMessage('No pude reconocer nada.', 'ai');
            return;
          }
          const top = predictions[0];
          const className = top.className.toLowerCase();
          const confianza = Math.round(top.probability * 100);
          let explicacion = '';
          if (className.includes('cat') || className.includes('gato') || className.includes('felino')) {
            explicacion = random(explicacionesGato);
          } else if (className.includes('dog') || className.includes('perro') || className.includes('canino') || className.includes('puppy')) {
            explicacion = random(explicacionesPerro);
          } else if (className.includes('plant') || className.includes('flor') || className.includes('tree') || className.includes('leaf') || className.includes('vegetal')) {
            explicacion = random(explicacionesPlanta);
          } else if (className.includes('person') || className.includes('human') || className.includes('man') || className.includes('woman') || className.includes('face')) {
            explicacion = random(explicacionesHumano);
          } else {
            explicacion = 'No reconozco esto como gato, perro, planta o humano. Solo identifico esas categorías.';
          }
          // Agregar confianza al inicio
          if (!explicacion.startsWith('No reconozco')) {
            explicacion = `(${confianza}% certeza) ${explicacion}`;
          }
          addMessage(explicacion, 'ai');
        } catch (err) {
          addMessage('Ocurrió un error al analizar la imagen.', 'ai');
        }
      };
    };
    reader.readAsDataURL(file);
    this.value = '';
  });

  // ─── CÁMARA EN VIVO (COCO-SSD) ───
  const cameraPanel = document.getElementById('cameraPanel');
  const video = document.getElementById('video');
  const overlay = document.getElementById('overlay');
  const liveInfo = document.getElementById('liveInfo');
  const ctx = overlay.getContext('2d');
  let cameraStream = null;
  let detectionActive = false;

  async function toggleCamera() {
    if (cameraPanel.style.display === 'none' || cameraPanel.style.display === '') {
      // Abrir cámara
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = cameraStream;
        await video.play();
        cameraPanel.style.display = 'block';
        startDetection();
      } catch (err) {
        alert('No se pudo acceder a la cámara. Verificá los permisos.');
        console.error(err);
      }
    } else {
      // Cerrar cámara
      stopDetection();
      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
      }
      video.srcObject = null;
      cameraPanel.style.display = 'none';
      ctx.clearRect(0, 0, overlay.width, overlay.height);
      liveInfo.textContent = '';
    }
  }

  function startDetection() {
    if (detectionActive) return;
    detectionActive = true;
    detectFrame();
  }

  function stopDetection() {
    detectionActive = false;
    ctx.clearRect(0, 0, overlay.width, overlay.height);
    liveInfo.textContent = '';
  }

  async function detectFrame() {
    if (!detectionActive) return;
    if (!video.videoWidth || !video.videoHeight) {
      requestAnimationFrame(detectFrame);
      return;
    }
    // Ajustar canvas al tamaño del video
    overlay.width = video.videoWidth;
    overlay.height = video.videoHeight;
    ctx.clearRect(0, 0, overlay.width, overlay.height);

    if (!cocoModel) {
      liveInfo.textContent = 'Cargando modelo de detección...';
      requestAnimationFrame(detectFrame);
      return;
    }

    try {
      const predictions = await cocoModel.detect(video);
      // Filtrar solo las cuatro categorías
      const relevant = predictions.filter(p =>
        ['cat', 'dog', 'person', 'potted plant'].includes(p.class)
      );

      // Dibujar recuadros
      for (const pred of relevant) {
        const [x, y, width, height] = pred.bbox;
        ctx.strokeStyle = '#00ff88';
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, width, height);
        ctx.fillStyle = '#00ff88';
        ctx.font = '14px system-ui';
        ctx.fillText(`${pred.class} (${Math.round(pred.score * 100)}%)`, x, y - 5);
      }

      // Mostrar información explicativa de lo detectado
      if (relevant.length > 0) {
        // Tomar la primera detección para dar explicación
        const first = relevant[0];
        const explicacion = obtenerExplicacion(first.class);
        liveInfo.textContent = explicacion || '';
      } else {
        liveInfo.textContent = 'No veo gato, perro, planta ni humano.';
      }
    } catch (err) {
      console.error('Error en detección:', err);
    }

    requestAnimationFrame(detectFrame);
  }

  // Capturar foto y enviar al chat
  function capturePhoto() {
    if (!video.videoWidth || !video.videoHeight) {
      alert('La cámara aún no está lista.');
      return;
    }
    // Crear un canvas temporal para capturar el frame
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = video.videoWidth;
    tempCanvas.height = video.videoHeight;
    const tempCtx = tempCanvas.getContext('2d');
    tempCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
    const dataUrl = tempCanvas.toDataURL('image/jpeg');
    addImageMessage(dataUrl, 'user');
    // Analizar la imagen capturada con MobileNet (como si fuera un archivo)
    analizarImagenCapturada(dataUrl);
  }

  async function analizarImagenCapturada(imageUrl) {
    if (!mobilenetModel) {
      addMessage('El modelo aún no está listo.', 'ai');
      return;
    }
    const imgElement = document.createElement('img');
    imgElement.src = imageUrl;
    imgElement.onload = async function () {
      try {
        const predictions = await mobilenetModel.classify(imgElement);
        if (predictions.length === 0) {
          addMessage('No pude reconocer nada.', 'ai');
          return;
        }
        const top = predictions[0];
        const className = top.className.toLowerCase();
        const confianza = Math.round(top.probability * 100);
        let explicacion = '';
        if (className.includes('cat') || className.includes('gato') || className.includes('felino')) {
          explicacion = random(explicacionesGato);
        } else if (className.includes('dog') || className.includes('perro') || className.includes('canino') || className.includes('puppy')) {
          explicacion = random(explicacionesPerro);
        } else if (className.includes('plant') || className.includes('flor') || className.includes('tree') || className.includes('leaf') || className.includes('vegetal')) {
          explicacion = random(explicacionesPlanta);
        } else if (className.includes('person') || className.includes('human') || className.includes('man') || className.includes('woman') || className.includes('face')) {
          explicacion = random(explicacionesHumano);
        } else {
          explicacion = 'No reconozco esto como gato, perro, planta o humano. Solo identifico esas categorías.';
        }
        if (!explicacion.startsWith('No reconozco')) {
          explicacion = `(${confianza}% certeza) ${explicacion}`;
        }
        addMessage(explicacion, 'ai');
      } catch (err) {
        addMessage('Error al analizar la imagen capturada.', 'ai');
      }
    };
  }

  // Eventos del textarea
  document.getElementById('input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  document.getElementById('input').addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
