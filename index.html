<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AOS-0.1</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      width: 600px;
      height: 580px;
      background: #1a1a1a;
      border-radius: 16px;
      border: 1px solid #2e2e2e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header { padding: 16px 20px; border-bottom: 1px solid #2e2e2e; font-size: 15px; font-weight: 500; color: #e0e0e0; }
    #messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 16px; scrollbar-width: thin; scrollbar-color: #333 transparent; }
    .msg-wrap { display: flex; flex-direction: column; max-width: 80%; }
    .msg-wrap.user { align-self: flex-end; align-items: flex-end; }
    .msg-wrap.ai   { align-self: flex-start; align-items: flex-start; }
    .bubble { padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-break: break-word; white-space: pre-wrap; }
    .bubble.user { background: #2a3a5e; color: #a8c4ff; border: 1px solid #3a4f7a; }
    .bubble.ai   { background: #252525; color: #d4d4d4; border: 1px solid #2e2e2e; }
    .label { font-size: 11px; color: #555; margin-top: 4px; padding: 0 4px; }
    .input-area { display: flex; gap: 8px; align-items: flex-end; padding: 12px 16px; border-top: 1px solid #2e2e2e; background: #1a1a1a; }
    textarea { flex: 1; resize: none; border: 1px solid #2e2e2e; border-radius: 10px; font-size: 14px; padding: 10px 12px; line-height: 1.5; max-height: 120px; overflow-y: auto; font-family: inherit; outline: none; background: #111; color: #d4d4d4; }
    textarea::placeholder { color: #444; }
    textarea:focus { border-color: #444; }
    button { height: 40px; padding: 0 18px; border-radius: 10px; border: 1px solid #2e2e2e; background: #252525; color: #d4d4d4; font-size: 14px; cursor: pointer; transition: background 0.15s; }
    button:hover  { background: #333; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: default; }
    .dots { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #555; animation: blink 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:.2;transform:scale(.8);} 40%{opacity:1;transform:scale(1);} }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
</head>
<body>
<div class="container">
  <div class="header">AOS-0.1</div>
  <div id="messages">
    <div class="msg-wrap ai">
      <div class="bubble ai">¡Hola! 👋 ¿En qué puedo ayudarte hoy?</div>
      <span class="label">IA</span>
    </div>
  </div>
  <div class="input-area">
    <input type="file" id="imageInput" accept="image/*" style="display:none" />
    <button id="attachBtn" onclick="document.getElementById('imageInput').click()">📎</button>
    <textarea id="input" rows="1" placeholder="Escribe tu mensaje..."></textarea>
    <button id="sendBtn" onclick="sendMessage()">Enviar</button>
  </div>
</div>

<script>
  // ─────────────────────────────────────────
  // CARGA DEL MODELO DE IMAGEN
  let mobilenetModel = null;
  (async function () {
    mobilenetModel = await mobilenet.load();
    console.log("Modelo listo para reconocer imágenes 🖼️");
  })();
  // ─────────────────────────────────────────

  // ─────────────────────────────────────────
  // RESPUESTAS PRE-PROGRAMADAS (con emojis)
  const respuestas = [
    {
      claves: ["hola", "buenas", "hey", "saludos", "buenos días", "buenas tardes", "buenas noches"],
      respuestas: [
        "¡Hola! 👋 ¿En qué te puedo ayudar?",
        "¡Hey! 😊 Aquí estoy, ¿qué necesitás?",
        "¡Buenas! 🌟 ¿Cómo te puedo ayudar hoy?",
        "¡Hola! 🎉 Un gusto. ¿En qué andás?"
      ]
    },
    {
      claves: ["cómo estás", "como estas", "qué tal", "todo bien", "cómo andás", "como andas"],
      respuestas: [
        "¡Muy bien, gracias! 😄 ¿Y vos?",
        "Todo excelente por acá. ✨ ¿Cómo estás vos?",
        "De maravilla. 🌈 ¿En qué te puedo ayudar?",
        "¡Bien! 💪 Listo para ayudarte."
      ]
    },
    {
      claves: ["nombre", "cómo te llamas", "como te llamas", "quién eres", "quien eres", "quien sos", "quíen sos", "cual es tu nombre"],
      respuestas: [
        "Soy tu asistente virtual 🤖. ¡Podés cambiar mi nombre en el código!",
        "Me llaman IA, aunque podés ponerme el nombre que quieras 😉.",
        "Soy un bot sencillo. Mi nombre lo definís vos 🏷️."
      ]
    },
    {
      claves: ["gracias", "muchas gracias", "te lo agradezco", "grax"],
      respuestas: [
        "¡De nada! 😊 Para eso estoy.",
        "¡Con gusto! 🌟 ¿Necesitás algo más?",
        "No hay de qué. 🙌 ¡Siempre a disposición!",
        "¡Fue un placer ayudarte! 🎉"
      ]
    },
    {
      claves: ["chau", "adiós", "adios", "hasta luego", "nos vemos", "bye"],
      respuestas: [
        "¡Hasta luego! 👋 Fue un placer.",
        "¡Chau! 🌻 Volvé cuando quieras.",
        "¡Nos vemos! 🚀 Que te vaya bien.",
        "¡Hasta pronto! 🌟",
        "¡Nos vemos! ✌️ Cuidate."
      ]
    },
    {
      claves: ["ayuda", "qué podés hacer", "que podes hacer", "qué hacés", "que haces", "para qué servís"],
      respuestas: [
        "Puedo responder preguntas que tengas programadas 💬. ¡Agregá más en el código!",
        "Soy un asistente simple con respuestas pre-cargadas 📦. ¡Personalizame!",
        "Por ahora respondo lo que me enseñaron 🧠. Podés ampliarme editando el archivo."
      ]
    }
  ];

  const fallbacks = [
    "No entendí bien eso 🤔. ¿Podés reformularlo?",
    "Hmm, no tengo una respuesta para eso todavía 🕵️.",
    "No estoy seguro de cómo responder eso 😕. ¿Intentás con otra pregunta?",
    "Eso está fuera de lo que sé por ahora 🚧."
  ];

  function random(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function obtenerRespuesta(texto) {
    const t = texto.toLowerCase().trim();
    for (const entrada of respuestas) {
      if (entrada.claves.some(c => t.includes(c))) return random(entrada.respuestas);
    }
    return random(fallbacks);
  }

  async function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    addMessage(text, 'user');
    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;
    const typing = addTyping();
    await new Promise(r => setTimeout(r, 700));
    typing.remove();
    addMessage(obtenerRespuesta(text), 'ai');
    document.getElementById('sendBtn').disabled = false;
  }

  function addMessage(text, role) {
    const wrap = document.createElement('div');
    wrap.className = `msg-wrap ${role}`;
    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.textContent = text;
    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = role === 'user' ? 'Tú' : 'IA';
    wrap.appendChild(bubble);
    wrap.appendChild(label);
    const msgs = document.getElementById('messages');
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addImageMessage(imageUrl, role) {
    const wrap = document.createElement('div');
    wrap.className = `msg-wrap ${role}`;
    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    const img = document.createElement('img');
    img.src = imageUrl;
    img.style.maxWidth = '200px';
    img.style.borderRadius = '10px';
    bubble.appendChild(img);
    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = role === 'user' ? 'Tú' : 'IA';
    wrap.appendChild(bubble);
    wrap.appendChild(label);
    const msgs = document.getElementById('messages');
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap ai';
    wrap.innerHTML = `<div class="bubble ai"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
    document.getElementById('messages').appendChild(wrap);
    document.getElementById('messages').scrollTop = 9999;
    return wrap;
  }

  // ─── EXPLICACIONES VARIADAS (ya con emojis) ───
  const explicacionesGato = [
    "🐱 **Gato** – Felino doméstico de cuerpo flexible y orejas puntiagudas. Sus bigotes le sirven para medir espacios y sus garras retráctiles lo ayudan a trepar. Tiene una excelente visión nocturna y un oído muy fino. Suelen ser independientes pero muy cariñosos cuando quieren.",
    "🐱 **Gato** – Animal de compañía con un esqueleto muy elástico y reflejos rápidos. Posee almohadillas en las patas que le permiten caminar en silencio. Es curioso por naturaleza y disfruta explorar su entorno.",
    "🐱 **Gato** – Mamífero carnívoro domesticado hace más de 4000 años. Sus ojos pueden dilatar mucho la pupila para ver en la oscuridad. Son conocidos por su ronroneo, que suelen usar para comunicar bienestar.",
    "🐱 **Gato** – Pequeño felino con un gran sentido del equilibrio gracias a su cola. Es un cazador nato, aunque viva en casa. Le encanta dormir muchas horas al día y asearse constantemente."
  ];

  const explicacionesPerro = [
    "🐶 **Perro** – Descendiente del lobo, domesticado por el ser humano. Tiene un olfato hasta 100.000 veces más potente que el nuestro. Es leal, sociable y capaz de entender muchas emociones humanas.",
    "🐶 **Perro** – Mamífero del orden de los carnívoros, con un hocico largo y una cola que expresa su estado de ánimo. Existen cientos de razas con tamaños y pelajes muy variados. Son grandes compañeros de vida.",
    "🐶 **Perro** – Animal de manada que disfruta la compañía y el juego. Su ladrido es una forma de comunicación, al igual que el movimiento de las orejas. Se lo considera el primer animal domesticado por el hombre.",
    "🐶 **Perro** – Fiel amigo de cuatro patas. Su sentido del oído le permite captar sonidos que nosotros no podemos. Respira agitadamente para regular su temperatura, ya que no suda como los humanos."
  ];

  const explicacionesPlanta = [
    "🌿 **Planta** – Organismo vivo que fabrica su propio alimento mediante la fotosíntesis. Sus hojas captan la luz solar y las raíces absorben agua y minerales del suelo. Son esenciales para producir oxígeno.",
    "🌿 **Planta** – Ser vivo del reino vegetal. Posee clorofila, que le da el color verde y le permite transformar la energía del sol en nutrientes. Puede ser un árbol, un arbusto, una flor o un cactus.",
    "🌿 **Planta** – Además de darnos oxígeno, las plantas son la base de la cadena alimenticia. Tienen ciclos de vida que incluyen germinación, crecimiento, floración y producción de semillas.",
    "🌿 **Planta** – Gracias a sus raíces, sujetan el suelo y evitan la erosión. Sus flores atraen insectos polinizadores y sus frutos dispersan las semillas. Sin ellas, la vida en la Tierra no sería posible."
  ];

  const explicacionesHumano = [
    "🧑 **Humano** – Ser bípedo con un cerebro muy desarrollado, capaz de razonar, crear arte y comunicarse con lenguajes complejos. Su postura erguida libera las manos para fabricar herramientas.",
    "🧑 **Humano** – Pertenece a la especie *Homo sapiens*. Se distingue por su capacidad de pensar de forma abstracta, planificar y cooperar en grandes grupos. Ha modificado el planeta como ningún otro ser vivo.",
    "🧑 **Humano** – Cuerpo con dos piernas, dos brazos y un cráneo grande que protege el cerebro. Su piel varía en tonos según la melanina. Gracias al lenguaje, transmite conocimiento de generación en generación.",
    "🧑 **Humano** – Ser social por naturaleza. Siente empatía, tiene conciencia de sí mismo y es capaz de imaginar escenarios futuros. Su infancia es prolongada comparada con otros mamíferos, lo que permite un largo aprendizaje."
  ];

  // ─── RECONOCIMIENTO DE IMÁGENES (con respuestas variadas) ───
  const imageInput = document.getElementById('imageInput');
  imageInput.addEventListener('change', async function () {
    const file = this.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async function (e) {
      const imageUrl = e.target.result;
      addImageMessage(imageUrl, 'user');

      if (!mobilenetModel) {
        addMessage('El modelo de imagen aún está cargando ⏳. Intentá de nuevo en unos segundos.', 'ai');
        return;
      }

      const imgElement = document.createElement('img');
      imgElement.src = imageUrl;
      imgElement.onload = async function () {
        try {
          const predictions = await mobilenetModel.classify(imgElement);
          if (predictions.length === 0) {
            addMessage('No pude reconocer nada en esta imagen 🧐.', 'ai');
            return;
          }

          const top = predictions[0];
          const className = top.className.toLowerCase();
          const confianza = Math.round(top.probability * 100);
          let explicacion = '';

          if (className.includes('cat') || className.includes('gato') || className.includes('felino')) {
            explicacion = random(explicacionesGato);
          } else if (className.includes('dog') || className.includes('perro') || className.includes('canino') || className.includes('puppy')) {
            explicacion = random(explicacionesPerro);
          } else if (className.includes('plant') || className.includes('flor') || className.includes('tree') || className.includes('leaf') || className.includes('vegetal')) {
            explicacion = random(explicacionesPlanta);
          } else if (className.includes('person') || className.includes('human') || className.includes('man') || className.includes('woman') || className.includes('face')) {
            explicacion = random(explicacionesHumano);
          } else {
            explicacion = 'No reconozco esto como gato, perro, planta o humano 🚫. Solo estoy configurado para identificar esas categorías.';
          }

          // Inyectar confianza manteniendo el emoji
          if (explicacion.startsWith('🐱') || explicacion.startsWith('🐶') || explicacion.startsWith('🌿') || explicacion.startsWith('🧑')) {
            const emojiEnd = explicacion.indexOf('**', 3) + 2;
            explicacion = `${explicacion.slice(0, emojiEnd)} (${confianza}% de certeza) ${explicacion.slice(emojiEnd)}`;
          }

          addMessage(explicacion, 'ai');
        } catch (err) {
          addMessage('Ocurrió un error al analizar la imagen 😥.', 'ai');
        }
      };
    };
    reader.readAsDataURL(file);
    this.value = '';
  });

  // Eventos del textarea
  document.getElementById('input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  document.getElementById('input').addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
