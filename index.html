<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AOS-0.1</title>
  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/iconfont/tabler-icons.min.css">
  <!-- TensorFlow.js + MobileNet -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --font-sans: system-ui, -apple-system, sans-serif;
      --border-radius-sm: 6px;
      --border-radius-md: 8px;
      --border-radius-lg: 16px;
      --sidebar-width: 260px;
    }
    /* Temas (sin cambios) */
    body.theme-dark {
      --color-background-primary: #0f0f0f;
      --color-background-secondary: #1c1c1c;
      --color-background-tertiary: #151515;
      --color-border-primary: #555;
      --color-border-secondary: #3a3a3a;
      --color-border-tertiary: #2e2e2e;
      --color-text-primary: #e0e0e0;
      --color-text-secondary: #a0a0a0;
      --color-text-tertiary: #666;
      --color-text-info: #a8c4ff;
      --color-background-info: #2a3a5e;
    }
    body.theme-gray {
      --color-background-primary: #1e1e1e;
      --color-background-secondary: #2c2c2c;
      --color-background-tertiary: #262626;
      --color-border-primary: #666;
      --color-border-secondary: #4a4a4a;
      --color-border-tertiary: #3a3a3a;
      --color-text-primary: #f0f0f0;
      --color-text-secondary: #b0b0b0;
      --color-text-tertiary: #888;
      --color-text-info: #c0d0ff;
      --color-background-info: #3a4a6a;
    }
    body.theme-light {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f2f2f2;
      --color-background-tertiary: #e8e8e8;
      --color-border-primary: #888;
      --color-border-secondary: #ccc;
      --color-border-tertiary: #ddd;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #444;
      --color-text-tertiary: #777;
      --color-text-info: #1d4ed8;
      --color-background-info: #dbeafe;
    }
    body {
      font-family: var(--font-sans);
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
    }
    /* Landing */
    #landing {
      text-align: center; max-width: 500px; padding: 30px 20px; color: #e0e0e0; width: 100%;
    }
    #landing .flag { font-size: 80px; margin-bottom: 20px; display: inline-block; opacity: 1; } /* visible siempre */
    #landing h1 { font-size: 32px; margin-bottom: 10px; font-weight: 600; opacity: 1; }
    #landing .desc { font-size: 16px; line-height: 1.6; margin: 20px 0; color: #b0b0b0; opacity: 1; }
    .lang-selector { display: flex; flex-direction: column; gap: 12px; margin: 30px 0 20px; opacity: 1; }
    .lang-btn {
      background: #252525; border: 1px solid #2e2e2e; border-radius: 12px;
      padding: 12px 20px; font-size: 16px; color: #d4d4d4; cursor: pointer; transition: all 0.2s; text-align: left;
    }
    .lang-btn:hover { background: #333; border-color: #444; }
    .lang-btn.selected { background: #2a3a5e; border-color: #3a4f7a; color: #a8c4ff; box-shadow: 0 0 8px rgba(58,79,122,0.5); }
    #startBtn {
      background: #2a3a5e; border: none; color: white; padding: 14px 40px;
      font-size: 18px; border-radius: 14px; cursor: pointer; transition: background 0.2s;
      margin-top: 10px; width: 100%; font-weight: 600; opacity: 1;
    }
    #startBtn:hover { background: #3a4f7a; }
    #startBtn:disabled { opacity: 0.4; cursor: default; background: #252525; color: #666; border: 1px solid #2e2e2e; }
    @media (max-width: 600px) {
      #landing .flag { font-size: 60px; } #landing h1 { font-size: 26px; } #landing .desc { font-size: 14px; }
      .lang-btn { padding: 10px 16px; font-size: 15px; }
    }
    /* App */
    #app {
      display: none; width: 100%; height: 100vh; max-width: 100%;
      background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary);
      border-radius: 0; overflow: hidden; position: relative;
    }
    @media (min-width: 769px) {
      #app { width: 900px; height: 650px; border-radius: var(--border-radius-lg); box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
      body { align-items: center; }
    }
    /* Sidebar, main, messages, etc. (todo el CSS de componentes ya incluido anteriormente) */
    /* ... (se mantiene exactamente igual, no lo repito para no alargar) ... */
  </style>
</head>
<body class="theme-dark">
  <div id="landing">
    <div class="flag">🇦🇷</div>
    <h1>AOS-0.1</h1>
    <div class="desc">¡Hola! Soy un asistente virtual creado por una sola persona.<br>Puedo charlar, reconocer imágenes, buscar en Wikipedia, programar y enseñar matemáticas.<br>Estoy en constante desarrollo. ¡Probame!</div>
    <div class="lang-selector" id="langSelector">
      <button class="lang-btn" data-lang="en">English</button>
      <button class="lang-btn" data-lang="es">Español (Latino)</button>
      <button class="lang-btn" data-lang="es_AR">Español (Argentina)</button>
    </div>
    <button id="startBtn" disabled onclick="iniciarChat()">Comenzar</button>
  </div>

  <!-- El resto del HTML (app, sidebar, etc.) exactamente igual que en tu último envío, sin cambios -->

  <script>
    // Todo el JavaScript que ya tenías, sin modificaciones salvo la carga del modelo
    // ...
  </script>
</body>
</html>
