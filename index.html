<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AOS-0.1</title>
  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/iconfont/tabler-icons.min.css">
  <!-- TensorFlow.js + MobileNet -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --font-sans: system-ui, -apple-system, sans-serif;
      --border-radius-sm: 6px;
      --border-radius-md: 8px;
      --border-radius-lg: 16px;
      --sidebar-width: 260px;
    }
    /* Temas (sin cambios) */
    body.theme-dark {
      --color-background-primary: #0f0f0f;
      --color-background-secondary: #1c1c1c;
      --color-background-tertiary: #151515;
      --color-border-primary: #555;
      --color-border-secondary: #3a3a3a;
      --color-border-tertiary: #2e2e2e;
      --color-text-primary: #e0e0e0;
      --color-text-secondary: #a0a0a0;
      --color-text-tertiary: #666;
      --color-text-info: #a8c4ff;
      --color-background-info: #2a3a5e;
    }
    body.theme-gray {
      --color-background-primary: #1e1e1e;
      --color-background-secondary: #2c2c2c;
      --color-background-tertiary: #262626;
      --color-border-primary: #666;
      --color-border-secondary: #4a4a4a;
      --color-border-tertiary: #3a3a3a;
      --color-text-primary: #f0f0f0;
      --color-text-secondary: #b0b0b0;
      --color-text-tertiary: #888;
      --color-text-info: #c0d0ff;
      --color-background-info: #3a4a6a;
    }
    body.theme-light {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f2f2f2;
      --color-background-tertiary: #e8e8e8;
      --color-border-primary: #888;
      --color-border-secondary: #ccc;
      --color-border-tertiary: #ddd;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #444;
      --color-text-tertiary: #777;
      --color-text-info: #1d4ed8;
      --color-background-info: #dbeafe;
    }
    body {
      font-family: var(--font-sans);
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
    }
    /* Landing */
    #landing {
      text-align: center; max-width: 500px; padding: 30px 20px; color: #e0e0e0; width: 100%;
    }
    #landing .flag { font-size: 80px; margin-bottom: 20px; display: inline-block; }
    #landing h1 { font-size: 32px; margin-bottom: 10px; font-weight: 600; }
    #landing .desc { font-size: 16px; line-height: 1.6; margin: 20px 0; color: #b0b0b0; }
    .lang-selector { display: flex; flex-direction: column; gap: 12px; margin: 30px 0 20px; }
    .lang-btn {
      background: #252525; border: 1px solid #2e2e2e; border-radius: 12px;
      padding: 12px 20px; font-size: 16px; color: #d4d4d4; cursor: pointer; transition: all 0.2s; text-align: left;
    }
    .lang-btn:hover { background: #333; border-color: #444; }
    .lang-btn.selected { background: #2a3a5e; border-color: #3a4f7a; color: #a8c4ff; box-shadow: 0 0 8px rgba(58,79,122,0.5); }
    #startBtn {
      background: #2a3a5e; border: none; color: white; padding: 14px 40px;
      font-size: 18px; border-radius: 14px; cursor: pointer; transition: background 0.2s;
      margin-top: 10px; width: 100%; font-weight: 600;
    }
    #startBtn:hover { background: #3a4f7a; }
    #startBtn:disabled { opacity: 0.4; cursor: default; background: #252525; color: #666; border: 1px solid #2e2e2e; }
    @media (max-width: 600px) {
      #landing .flag { font-size: 60px; } #landing h1 { font-size: 26px; } #landing .desc { font-size: 14px; }
      .lang-btn { padding: 10px 16px; font-size: 15px; }
    }
    /* App */
    #app {
      display: none; width: 100%; height: 100vh; max-width: 100%;
      background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary);
      border-radius: 0; overflow: hidden; position: relative;
    }
    @media (min-width: 769px) {
      #app { width: 900px; height: 650px; border-radius: var(--border-radius-lg); box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
      body { align-items: center; }
    }
    /* Sidebar */
    #sidebar {
      width: var(--sidebar-width); min-width: var(--sidebar-width);
      background: var(--color-background-tertiary); display: flex; flex-direction: column;
      border-right: 0.5px solid var(--color-border-tertiary); position: absolute;
      top: 0; left: 0; bottom: 0; z-index: 100; transition: transform 0.3s ease;
      transform: translateX(-100%);
    }
    @media (min-width: 769px) {
      #sidebar { position: relative; transform: none; }
    }
    #sidebar.open { transform: translateX(0); }
    #sidebar-backdrop { display: none; position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); z-index:99; }
    #sidebar-backdrop.show { display: block; }
    #sidebar-header { padding: 12px; display: flex; align-items: center; justify-content: space-between; }
    #sidebar-header .logo { font-size: 15px; font-weight: 500; color: var(--color-text-primary); display: flex; align-items: center; gap: 8px; }
    .icon-btn { background: none; border: none; cursor: pointer; color: var(--color-text-secondary); padding: 6px; border-radius: var(--border-radius-md); display: flex; align-items: center; justify-content: center; }
    .icon-btn:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
    .new-chat-btn { margin: 4px 12px 8px; padding: 8px 12px; background: none; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); cursor: pointer; color: var(--color-text-primary); font-size: 13px; display: flex; align-items: center; gap: 8px; width: calc(100% - 24px); text-align: left; transition: background 0.15s; }
    .new-chat-btn:hover { background: var(--color-background-secondary); }
    .sidebar-section { padding: 4px 12px; font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); letter-spacing: 0.05em; text-transform: uppercase; margin-top: 8px; }
    .chat-item { padding: 8px 12px; cursor: pointer; border-radius: var(--border-radius-md); margin: 1px 8px; font-size: 13px; color: var(--color-text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: background 0.12s; }
    .chat-item:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
    .chat-item.active { background: var(--color-background-secondary); color: var(--color-text-primary); }
    .sidebar-footer { margin-top: auto; padding: 12px; border-top: 0.5px solid var(--color-border-tertiary); }
    .user-row { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: var(--border-radius-md); cursor: pointer; }
    .user-row:hover { background: var(--color-background-secondary); }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--color-background-info); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; color: var(--color-text-info); flex-shrink: 0; }
    .user-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
    /* Main */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; width: 100%; }
    #topbar { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 0.5px solid var(--color-border-tertiary); }
    #menu-toggle { display: flex; } @media (min-width: 769px) { #menu-toggle { display: none; } }
    #model-selector { display: flex; align-items: center; gap: 6px; padding: 6px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); cursor: pointer; font-size: 13px; font-weight: 500; color: var(--color-text-primary); background: none; }
    #model-selector:hover { background: var(--color-background-secondary); }
    .topbar-actions { display: flex; gap: 4px; }
    /* Messages – ahora con mejor padding en móviles */
    #messages {
      flex: 1; overflow-y: auto; padding: 20px 16px; /* más espacio lateral en móviles */
      scroll-behavior: smooth; display: none;
    }
    @media (min-width: 769px) {
      #messages { padding: 20px 16px; }
    }
    .msg-row { padding: 4px 0; display: flex; animation: messagePop 0.3s ease both; }
    .msg-row.user { justify-content: flex-end; } .msg-row.assistant { justify-content: flex-start; }
    .msg-content { max-width: 88%; } /* un poco más ancho en móviles pero con margen */
    @media (min-width: 769px) { .msg-content { max-width: 72%; } }
    .msg-row.assistant .msg-content { display: flex; gap: 8px; align-items: flex-start; padding: 0 4px; }
    @media (min-width: 769px) { .msg-row.assistant .msg-content { padding: 0 16px; } }
    .assistant-icon { width: 24px; height: 24px; min-width: 24px; border-radius: 50%; background: var(--color-background-tertiary); border: 0.5px solid var(--color-border-secondary); display: flex; align-items: center; justify-content: center; margin-top: 2px; }
    .assistant-icon i { font-size: 12px; color: var(--color-text-secondary); }
    .bubble { padding: 8px 12px; border-radius: 16px; font-size: 14px; line-height: 1.5; color: var(--color-text-primary); }
    .msg-row.user .bubble { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 16px 16px 4px 16px; margin-right: 4px; }
    .msg-row.assistant .bubble { background: none; padding: 2px 0; border-radius: 0; border: none; }

    /* Resto del CSS (code, modals, empty state, input, etc.) se mantiene idéntico */
    /* ... (copiá el resto del CSS de la respuesta anterior, no lo repito por brevedad) ... */
  </style>
</head>
<body class="theme-dark">
  <!-- Landing (sin cambios) -->
  <div id="landing">...</div>

  <div id="app">
    <!-- Sidebar, topbar, mensajes, input (como antes) con el botón de feedback añadido -->
    <div id="sidebar">...</div>
    <div id="main">
      <div id="topbar">
        <div style="display:flex;align-items:center;gap:8px;">
          <button class="icon-btn" id="menu-toggle" onclick="toggleSidebar()"><i class="ti ti-menu-2"></i></button>
          <button id="model-selector">AOS-0.1 <i class="ti ti-chevron-down" style="font-size:12px;"></i></button>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn" title="Enviar feedback" onclick="openFeedback()"><i class="ti ti-message-report"></i></button>
          <button class="icon-btn" title="Cambiar tema" onclick="cambiarTema()"><i class="ti ti-sun-moon"></i></button>
        </div>
      </div>
      <!-- resto del main igual, con el modal de feedback al final -->
      ...
    </div>
  </div>

  <!-- Modal de feedback -->
  <div id="feedback-modal" class="modal-overlay" style="display:none;">
    <div class="feedback-box">
      <h3>✉️ Enviar comentario</h3>
      <p style="margin-bottom:1rem;color:var(--color-text-secondary);">¿Encontraste un error o tenés una idea? Escribila acá y me llegará a mi correo.</p>
      <textarea id="feedback-text" rows="5" placeholder="Escribe tu sugerencia o reporte..."></textarea>
      <div class="feedback-actions">
        <button onclick="closeFeedback()" class="btn-secondary">Cancelar</button>
        <button onclick="enviarFeedback()" class="btn-primary">Enviar</button>
      </div>
    </div>
  </div>

  <!-- El resto del script se mantiene, añadiendo las funciones de feedback -->
  <script>
    // ... (todo el código anterior de la IIFE)

    // ─── FEEDBACK ───
    const DEVELOPER_EMAIL = 'supportaos5@gmail.com'; // ← CAMBIÁ ESTO POR TU GMAIL
    const feedbackModal = document.getElementById('feedback-modal');

    window.openFeedback = function() {
      feedbackModal.style.display = 'flex';
      document.getElementById('feedback-text').focus();
    };

    window.closeFeedback = function() {
      feedbackModal.style.display = 'none';
      document.getElementById('feedback-text').value = '';
    };

    window.enviarFeedback = function() {
      const mensaje = document.getElementById('feedback-text').value.trim();
      if (!mensaje) {
        alert('Escribe un mensaje antes de enviar.');
        return;
      }
      const asunto = 'Feedback AOS-0.1';
      const cuerpo = `Hola,\n\nQuiero comentar lo siguiente sobre AOS-0.1:\n\n${mensaje}\n\nSaludos.`;
      window.open(`mailto:${DEVELOPER_EMAIL}?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpo)}`);
      closeFeedback();
    };

    // Estilos adicionales para el modal (agregalos dentro del <style>)
    /* ─── MODAL FEEDBACK ─── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .feedback-box {
      background: var(--color-background-primary); border-radius: var(--border-radius-lg);
      padding: 2rem; width: 100%; max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border: 0.5px solid var(--color-border-tertiary);
    }
    .feedback-box textarea {
      width: 100%; padding: 12px; background: var(--color-background-secondary);
      border: 1px solid var(--color-border-secondary); border-radius: 12px;
      color: var(--color-text-primary); font-family: inherit; resize: vertical;
    }
    .feedback-actions {
      display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem;
    }
    .btn-primary, .btn-secondary {
      padding: 8px 16px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600;
    }
    .btn-primary {
      background: var(--color-text-info); color: var(--color-background-primary);
    }
    .btn-secondary {
      background: var(--color-background-secondary); color: var(--color-text-secondary);
      border: 1px solid var(--color-border-secondary);
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary:hover { background: var(--color-background-tertiary); }
  </script>
</body>
</html>
